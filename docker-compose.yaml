services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_PATH: /data/condovida.db
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      REFRESH_EXPIRES_IN: ${REFRESH_EXPIRES_IN:-7d}
      DEMO_PASSWORD: ${DEMO_PASSWORD:-}
      CORS_ORIGIN: https://condovida.dvcode.com.br
    volumes:
      - api_data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://condovida.dvcode.com.br/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
        VITE_WS_URL: ""
        VITE_USE_MOCK: "false"
        VITE_DEMO_MODE: ${VITE_DEMO_MODE:-false}
        VITE_DEMO_PASSWORD: ${VITE_DEMO_PASSWORD:-}
    restart: unless-stopped
    depends_on:
      - api
    labels:
      - "coolify.managed=true"

volumes:
  api_data:
